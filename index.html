<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#04020a" />
    <meta name="format-detection" content="telephone=no" />
    <title>METROPHAGE</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="description" content="Fight the corps, run the sprawl, earn $METRO. A neon-noir cyberpunk action-RPG in your browser." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="METROPHAGE — neon cyberpunk action-RPG" />
    <meta property="og:description" content="Fight the corps, run the sprawl, earn $METRO. Deploy into the shared sprawl from your browser." />
    <meta property="og:image" content="https://metrophagev1.pages.dev/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="METROPHAGE — neon cyberpunk action-RPG" />
    <meta name="twitter:image" content="https://metrophagev1.pages.dev/og.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Orbitron:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --void: #04020a;
        --cyan: #00e5ff;
        --magenta: #ff2bd6;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        height: 100dvh;
        background: var(--void);
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-text-size-adjust: 100%;
        font-family: "IBM Plex Mono", "Courier New", ui-monospace, monospace;
      }
      #game-root {
        position: fixed;
        inset: 0;
        /* Desktop: keep a tiny safe inset; mobile goes edge-to-edge (see .mp-mobile). */
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom)
          env(safe-area-inset-left);
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
        width: 100%;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
      }
      #game-root canvas {
        image-rendering: auto;
        filter: contrast(1.04) saturate(1.14) brightness(1.03);
        box-shadow:
          0 0 120px rgba(0, 229, 255, 0.06),
          0 0 280px rgba(255, 43, 214, 0.04),
          inset 0 0 80px rgba(0, 0, 0, 0.35);
        border-radius: 2px;
        max-width: 100%;
        max-height: 100%;
        touch-action: none;
      }
      /* Mobile landscape: fit the full game in the visible window (no crop).
         Phaser FIT letterboxes if needed so HUD / world edges stay on-screen. */
      .mp-mobile,
      .mp-mobile body {
        width: 100%;
        height: 100%;
        height: 100dvh;
        height: -webkit-fill-available;
        max-width: 100vw;
        max-height: 100dvh;
        overflow: hidden;
        position: fixed;
        inset: 0;
        background: #04020a;
      }
      .mp-mobile #game-root {
        /* Minimal safe-area; JS pins visualViewport size for max usable width. */
        padding: 0;
        width: 100%;
        height: 100%;
        max-width: 100vw;
        max-height: 100dvh;
        max-height: -webkit-fill-available;
        overflow: hidden;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .mp-mobile #game-root canvas {
        /* Phaser FIT sets display size; max bounds keep the full game on-screen
           and as wide as the phone aspect allows (no side crop). */
        max-width: 100% !important;
        max-height: 100% !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        filter: contrast(1.03) saturate(1.1) brightness(1.02);
        display: block;
        margin: 0 auto;
      }
      /* True browser fullscreen (Android Chrome) — whole phone display. */
      .mp-mobile:fullscreen,
      .mp-mobile:-webkit-full-screen,
      html.mp-fs,
      html.mp-fs body {
        width: 100% !important;
        height: 100% !important;
        background: #04020a;
      }
      .mp-mobile:fullscreen #game-root,
      .mp-mobile:-webkit-full-screen #game-root,
      .mp-fs #game-root {
        width: 100% !important;
        height: 100% !important;
        max-width: none !important;
        max-height: none !important;
        left: 0 !important;
        top: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        padding: 0 !important;
        position: fixed !important;
      }
      .mp-mobile:fullscreen #game-root canvas,
      .mp-mobile:-webkit-full-screen #game-root canvas,
      .mp-fs #game-root canvas {
        max-width: 100% !important;
        max-height: 100% !important;
      }
      /* FULL only installed when Fullscreen API exists (Android). iOS: no button. */
      #mp-fs-btn {
        position: fixed;
        top: max(6px, env(safe-area-inset-top, 0px));
        right: max(6px, env(safe-area-inset-right, 0px));
        z-index: 9998;
        min-width: 0;
        min-height: 0;
        padding: 5px 8px;
        border-radius: 6px;
        border: 1px solid rgba(0, 229, 255, 0.55);
        background: rgba(6, 6, 18, 0.82);
        color: #00e5ff;
        font-family: Orbitron, "IBM Plex Mono", monospace;
        font-size: 8px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        touch-action: manipulation;
        box-shadow: 0 0 10px rgba(0, 229, 255, 0.14);
        -webkit-tap-highlight-color: transparent;
        display: block;
        line-height: 1.1;
      }
      #mp-fs-btn.on {
        border-color: rgba(255, 43, 214, 0.7);
        color: #ff8ae6;
        box-shadow: 0 0 10px rgba(255, 43, 214, 0.2);
      }
      #mp-fs-btn:active {
        transform: scale(0.97);
      }
      /* Compact $METRO chip on phones, TOP-right (MetroPanel's CSS matches this).
         Must not be bottom-anchored: the bottom-right corner is the ATK pad, whose
         touch radius reaches past the corner, and this chip is fixed HTML above the
         canvas — so a bottom chip swallows fire taps. Bottom-left is the move stick,
         bottom-centre the hotbar; the top-right lane is display-only intel text. */
      body.mp-mobile #metro-fab {
        right: max(6px, env(safe-area-inset-right, 0px)) !important;
        top: max(6px, env(safe-area-inset-top, 0px)) !important;
        bottom: auto !important;
        min-width: 0 !important;
        min-height: 0 !important;
        padding: 5px 7px !important;
        font-size: 8px !important;
        letter-spacing: 0.06em !important;
        border-radius: 6px !important;
      }
      /* FULL (Android only) already owns the very top-right; stack the chip under it. */
      body.mp-mobile.mp-has-fs #metro-fab {
        top: calc(max(6px, env(safe-area-inset-top, 0px)) + 30px) !important;
      }
      /* Full landscape gate — phone must be on its side to play. */
      #mp-landscape-gate {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 100;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(ellipse at 50% 40%, #1a0a28 0%, #04020a 70%);
        color: #eafdff;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }
      #mp-landscape-gate.mp-show {
        display: flex;
      }
      .mp-land-inner {
        max-width: 320px;
      }
      .mp-land-phone {
        font-size: 56px;
        line-height: 1;
        margin-bottom: 18px;
        animation: mpPhoneTilt 1.6s ease-in-out infinite;
        filter: drop-shadow(0 0 18px rgba(0, 229, 255, 0.45));
      }
      .mp-land-title {
        font-family: "Orbitron", sans-serif;
        font-weight: 800;
        font-size: 18px;
        letter-spacing: 0.18em;
        color: #00e5ff;
        margin-bottom: 12px;
        text-shadow: 0 0 16px rgba(0, 229, 255, 0.5);
      }
      .mp-land-body {
        font-size: 13px;
        line-height: 1.55;
        color: #9aa3b2;
        margin-bottom: 16px;
      }
      .mp-land-hint {
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #39ff88;
      }
      @keyframes mpPhoneTilt {
        0%,
        100% {
          transform: rotate(0deg);
        }
        40% {
          transform: rotate(90deg);
        }
        60% {
          transform: rotate(90deg);
        }
      }
      /* Hide game while portrait-blocked so players only see the rotate gate. */
      .mp-portrait-block #game-root,
      .mp-portrait-block #boot,
      .mp-portrait-block #rotate-hint {
        visibility: hidden !important;
        pointer-events: none !important;
      }
      #rotate-hint {
        display: none;
      }
      /* Full-screen cold-open Stream intro — above canvas, below landscape gate. */
      #mp-intro {
        position: fixed;
        inset: 0;
        z-index: 8;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        opacity: 0;
        transition: opacity 0.7s ease;
        pointer-events: auto;
        touch-action: manipulation;
      }
      #mp-intro.mp-intro-show {
        opacity: 1;
      }
      #mp-intro.mp-intro-hide {
        opacity: 0;
        pointer-events: none;
      }
      #mp-intro iframe,
      #mp-intro video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        object-fit: contain;
        background: #000;
      }
      #mp-intro .mp-intro-skip {
        position: absolute;
        top: max(14px, env(safe-area-inset-top));
        right: max(16px, env(safe-area-inset-right));
        z-index: 2;
        font-family: "Orbitron", sans-serif;
        font-weight: 700;
        font-size: 12px;
        letter-spacing: 0.16em;
        color: rgba(234, 253, 255, 0.72);
        background: rgba(4, 2, 10, 0.55);
        border: 1px solid rgba(0, 229, 255, 0.35);
        padding: 8px 14px;
        cursor: pointer;
        text-shadow: 0 0 10px rgba(0, 229, 255, 0.35);
        transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      }
      #mp-intro .mp-intro-skip:hover,
      #mp-intro .mp-intro-skip:focus-visible {
        color: #00e5ff;
        border-color: rgba(0, 229, 255, 0.75);
        background: rgba(4, 2, 10, 0.78);
        outline: none;
      }
      #mp-intro .mp-intro-sound {
        position: absolute;
        top: max(14px, env(safe-area-inset-top));
        left: max(16px, env(safe-area-inset-left));
        z-index: 2;
        font-family: "Orbitron", sans-serif;
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 0.12em;
        color: rgba(247, 255, 60, 0.92);
        background: rgba(4, 2, 10, 0.62);
        border: 1px solid rgba(247, 255, 60, 0.45);
        padding: 8px 12px;
        cursor: pointer;
        text-shadow: 0 0 10px rgba(247, 255, 60, 0.35);
        transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      }
      #mp-intro .mp-intro-sound:hover,
      #mp-intro .mp-intro-sound:focus-visible {
        color: #f7ff3c;
        border-color: rgba(247, 255, 60, 0.85);
        background: rgba(4, 2, 10, 0.82);
        outline: none;
      }
      #mp-intro .mp-intro-sound[hidden] {
        display: none !important;
      }
      #mp-intro .mp-intro-hint {
        position: absolute;
        bottom: max(18px, env(safe-area-inset-bottom));
        left: 50%;
        transform: translateX(-50%);
        z-index: 2;
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.2em;
        color: rgba(107, 113, 132, 0.9);
        pointer-events: none;
        text-transform: uppercase;
      }
      /* Mandatory deployment teaser: title/tutorial choice -> clip -> OnlineScene. */
      #mp-deploy-teaser.mp-video-overlay {
        position: fixed;
        inset: 0;
        z-index: 8;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        opacity: 0;
        transition: opacity 0.32s ease;
        pointer-events: auto;
        touch-action: none;
      }
      #mp-deploy-teaser.mp-video-overlay-show {
        opacity: 1;
      }
      #mp-deploy-teaser.mp-video-overlay-hide {
        opacity: 0;
        pointer-events: none;
      }
      #mp-deploy-teaser video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        object-fit: contain;
        background: #000;
        pointer-events: none;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        background: radial-gradient(ellipse at 50% 42%, #120a24 0%, var(--void) 68%);
        pointer-events: none;
        transition: opacity 0.8s ease;
        z-index: 4;
      }
      #boot .logo {
        font-family: "Orbitron", sans-serif;
        font-weight: 900;
        font-size: clamp(22px, 2.4vw, 36px);
        letter-spacing: 0.38em;
        color: var(--magenta);
        text-shadow: 0 0 18px rgba(255, 43, 214, 0.55), 0 0 42px rgba(0, 229, 255, 0.2);
        animation: bootPulse 2.4s ease-in-out infinite;
      }
      #boot .tag {
        font-family: "IBM Plex Mono", monospace;
        font-size: clamp(10px, 0.85vw, 13px);
        letter-spacing: 0.28em;
        color: #6b7184;
      }
      #boot .bar {
        width: min(280px, 52vw);
        height: 3px;
        background: #141026;
        border: 1px solid rgba(0, 229, 255, 0.25);
        overflow: hidden;
      }
      #boot .bar > span {
        display: block;
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--cyan), var(--magenta));
        box-shadow: 0 0 12px rgba(0, 229, 255, 0.45);
        transition: width 0.15s ease;
      }
      /* Bottom-center chip — only interactive element on the boot veil. */
      #boot .report-bugs {
        position: absolute;
        left: 50%;
        bottom: max(22px, env(safe-area-inset-bottom, 0px) + 14px);
        transform: translateX(-50%);
        pointer-events: auto;
        z-index: 5;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: "Orbitron", sans-serif;
        font-weight: 700;
        font-size: 10px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        text-decoration: none;
        color: rgba(0, 229, 255, 0.78);
        background: rgba(6, 6, 18, 0.72);
        border: 1px solid rgba(0, 229, 255, 0.32);
        border-radius: 999px;
        padding: 9px 16px 9px 12px;
        box-shadow: 0 0 18px rgba(0, 229, 255, 0.12), inset 0 0 12px rgba(0, 229, 255, 0.04);
        transition: color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      #boot .report-bugs::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--magenta);
        box-shadow: 0 0 8px rgba(255, 43, 214, 0.75);
        flex: none;
      }
      #boot .report-bugs:hover,
      #boot .report-bugs:focus-visible {
        color: #eafdff;
        border-color: rgba(0, 229, 255, 0.72);
        background: rgba(8, 12, 28, 0.88);
        box-shadow: 0 0 22px rgba(0, 229, 255, 0.28), inset 0 0 14px rgba(255, 43, 214, 0.06);
        outline: none;
      }
      @keyframes bootPulse {
        0%,
        100% {
          opacity: 0.92;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.02);
        }
      }
    </style>
  </head>
  <body>
    <div id="game-root"></div>
    <div id="boot">
      <div class="logo">METROPHAGE</div>
      <div class="tag">INITIALIZING NEON GRID</div>
      <div class="bar"><span id="boot-bar"></span></div>
      <a
        class="report-bugs"
        href="https://t.me/m/K5ctxpcaNzdh"
        target="_blank"
        rel="noopener noreferrer"
        title="Report bugs on Telegram"
        >Report bugs</a
      >
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
