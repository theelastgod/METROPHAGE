name = "metrophage-server"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Authoritative per-zone simulation lives in a Durable Object.
[[durable_objects.bindings]]
name = "WORLD"
class_name = "WorldDO"

# SQLite-backed DO (not new_classes): free-tier eligible + Cloudflare's recommended
# default. Every storage API WorldDO uses — state.storage get/put, alarms, and the
# Hibernation WebSocket set — is supported on SQLite-backed Durable Objects, so this
# is a strictly-better choice made at creation (the class has never been deployed).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["WorldDO"]

# Durable source of truth. database_id is a placeholder for local dev — `wrangler
# dev` / `d1 migrations apply --local` use a local SQLite file under .wrangler/state
# and ignore it. A real id gets filled in at deploy time (Step 7).
[[d1_databases]]
binding = "DB"
database_name = "metrophage"
database_id = "7f030a09-a0d0-44f5-8192-cf657bd04253"
migrations_dir = "migrations"
