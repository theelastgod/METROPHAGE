<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" font-family="'IBM Plex Mono','SFMono-Regular',ui-monospace,monospace">
  <defs>
    <radialGradient id="sky" cx="50%" cy="14%" r="120%">
      <stop offset="0%" stop-color="#1a0f33"/>
      <stop offset="45%" stop-color="#0b0720"/>
      <stop offset="100%" stop-color="#04030c"/>
    </radialGradient>
    <linearGradient id="mag" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="55%" stop-color="#ff2bd6"/>
      <stop offset="100%" stop-color="#ff5cae"/>
    </linearGradient>
    <linearGradient id="haze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff2bd6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ff2bd6" stop-opacity="0.16"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="480" fill="url(#sky)"/>

  <!-- horizon haze -->
  <rect x="0" y="300" width="1200" height="180" fill="url(#haze)"/>
  <line x1="0" y1="330" x2="1200" y2="330" stroke="#ff2bd6" stroke-opacity="0.25" stroke-width="1"/>

  <!-- perspective grid floor -->
  <g stroke="#00e5ff" stroke-opacity="0.13" stroke-width="1">
    <line x1="600" y1="330" x2="-260" y2="480"/>
    <line x1="600" y1="330" x2="120" y2="480"/>
    <line x1="600" y1="330" x2="360" y2="480"/>
    <line x1="600" y1="330" x2="600" y2="480"/>
    <line x1="600" y1="330" x2="840" y2="480"/>
    <line x1="600" y1="330" x2="1080" y2="480"/>
    <line x1="600" y1="330" x2="1460" y2="480"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="404" x2="1200" y2="404"/>
    <line x1="0" y1="462" x2="1200" y2="462"/>
  </g>

  <!-- skyline silhouette -->
  <g fill="#080614" stroke="#00e5ff" stroke-opacity="0.35" stroke-width="1.5">
    <rect x="70"  y="196" width="60"  height="134"/>
    <rect x="140" y="150" width="46"  height="180"/>
    <rect x="196" y="228" width="72"  height="102"/>
    <rect x="286" y="120" width="40"  height="210"/>
    <rect x="336" y="186" width="66"  height="144"/>
    <rect x="900" y="204" width="70"  height="126"/>
    <rect x="980" y="158" width="44"  height="172"/>
    <rect x="1034" y="230" width="80" height="100"/>
    <rect x="1120" y="176" width="44" height="154"/>
  </g>
  <!-- lit windows -->
  <g fill="#ff2bd6" fill-opacity="0.8">
    <rect x="84" y="212" width="6" height="6"/><rect x="100" y="230" width="6" height="6"/><rect x="112" y="256" width="6" height="6"/>
    <rect x="152" y="168" width="6" height="6"/><rect x="166" y="196" width="6" height="6"/><rect x="152" y="238" width="6" height="6"/>
    <rect x="298" y="140" width="6" height="6"/><rect x="310" y="176" width="6" height="6"/><rect x="298" y="228" width="6" height="6"/>
  </g>
  <g fill="#00e5ff" fill-opacity="0.8">
    <rect x="992" y="176" width="6" height="6"/><rect x="1006" y="208" width="6" height="6"/><rect x="992" y="252" width="6" height="6"/>
    <rect x="914" y="222" width="6" height="6"/><rect x="944" y="250" width="6" height="6"/>
    <rect x="1132" y="196" width="6" height="6"/><rect x="1146" y="236" width="6" height="6"/>
  </g>

  <!-- central tower / spire -->
  <g filter="url(#soft)"><ellipse cx="600" cy="250" rx="150" ry="120" fill="#ff2bd6" fill-opacity="0.12"/></g>
  <polygon points="576,330 560,120 600,70 640,120 624,330" fill="#0a0820" stroke="url(#mag)" stroke-width="2"/>
  <line x1="600" y1="70" x2="600" y2="14" stroke="#00e5ff" stroke-width="2"/>
  <circle cx="600" cy="14" r="5" fill="#00e5ff" filter="url(#glow)"/>

  <!-- title -->
  <text x="600" y="250" text-anchor="middle" font-size="86" font-weight="700" letter-spacing="14" fill="url(#mag)" filter="url(#glow)">METROPHAGE</text>
  <text x="600" y="292" text-anchor="middle" font-size="18" letter-spacing="10" fill="#9fb4c8">NEON-NOIR ACTION-MMO · FIELD MANUAL</text>

  <!-- corner ticks -->
  <g stroke="#00e5ff" stroke-opacity="0.6" stroke-width="2" fill="none">
    <path d="M24 24 h34 M24 24 v34"/><path d="M1176 24 h-34 M1176 24 v34"/>
    <path d="M24 456 h34 M24 456 v-34"/><path d="M1176 456 h-34 M1176 456 v-34"/>
  </g>
</svg>
